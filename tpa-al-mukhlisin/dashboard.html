<section id="page-dashboard" class="page" hidden>
  <div class="section-title">
    <h2>Dashboard</h2>
    <span class="muted" id="dash-tanggal"></span>
  </div>

  <div class="kpi-grid" id="dash-kpi">
    <div class="glass kpi-card"><div class="skeleton" style="height:2.5rem;"></div></div>
    <div class="glass kpi-card"><div class="skeleton" style="height:2.5rem;"></div></div>
    <div class="glass kpi-card"><div class="skeleton" style="height:2.5rem;"></div></div>
    <div class="glass kpi-card"><div class="skeleton" style="height:2.5rem;"></div></div>
  </div>

  <div class="section-title"><h2>Siswa aktif per kelas</h2></div>
  <div class="table-scroll surface-solid" id="dash-per-kelas">
    <div style="padding:1rem;" class="muted">Memuat...</div>
  </div>

  <div class="section-title"><h2>Menu cepat</h2></div>
  <div class="quick-links">
    <button type="button" class="glass quick-link card-tilt" data-page="siswa"><span class="ic">👥</span> Manajemen Siswa</button>
    <button type="button" class="glass quick-link card-tilt" data-page="kelas"><span class="ic">🏫</span> Manajemen Kelas</button>
    <button type="button" class="glass quick-link card-tilt" data-page="kehadiran"><span class="ic">📋</span> Input Kehadiran</button>
    <button type="button" class="glass quick-link card-tilt" data-page="infaq"><span class="ic">💰</span> Input Infaq</button>
    <button type="button" class="glass quick-link card-tilt" data-page="laporan"><span class="ic">📄</span> Unduh Laporan</button>
    <button type="button" class="glass quick-link card-tilt" data-page="admin" hidden><span class="ic">🔐</span> Kelola Admin</button>
  </div>
</section>

<script>
  (function () {
    Router.daftar('dashboard', { onShow: muatDashboard });

    function muatDashboard() {
      document.getElementById('dash-tanggal').textContent = formatTanggalIndo(hariIniStr());
      var btnAdmin = document.querySelector('#page-dashboard [data-page="admin"]');
      if (btnAdmin) btnAdmin.hidden = State.peran !== 'super_admin';

      panggilAman('getDashboardData').then(renderDashboard).catch(function () {});
    }

    function renderDashboard(d) {
      var kh = d.kehadiranHariIni;
      document.getElementById('dash-kpi').innerHTML =
        kartuKpi('Siswa Aktif', d.totalSiswaAktif, d.jumlahKelasAktif + ' kelas aktif') +
        kartuKpi('Hadir Hari Ini', kh.hitung.H, kh.totalDicatat + '/' + kh.totalSiswaAktif + ' tercatat') +
        kartuKpi('Sakit / Izin / Alpa', (kh.hitung.S + kh.hitung.I + kh.hitung.A), 'S ' + kh.hitung.S + ' &middot; I ' + kh.hitung.I + ' &middot; A ' + kh.hitung.A) +
        kartuKpi('Infaq Bulan Ini', formatRupiah(d.totalInfaqBulanIni), NAMA_BULAN[d.bulanIni.bulan - 1] + ' ' + d.bulanIni.tahun);

      var wrap = document.getElementById('dash-per-kelas');
      if (!d.siswaPerKelas.length) {
        wrap.innerHTML = '<div class="empty-state"><div class="ic">🏫</div>Belum ada kelas aktif. <a href="#kelas" data-page="kelas">Tambah kelas</a></div>';
        return;
      }
      var html = '<table class="data"><thead><tr><th>Kelas</th><th>Siswa Aktif</th></tr></thead><tbody>';
      d.siswaPerKelas.forEach(function (k) {
        html += '<tr><td>' + escapeHtml(k.namaKelas) + '</td><td>' + k.jumlahSiswa + '</td></tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    }

    function kartuKpi(label, nilai, sub) {
      return '<div class="glass kpi-card card-tilt">' +
        '<span class="kpi-label">' + escapeHtml(label) + '</span>' +
        '<span class="kpi-value tabular">' + nilai + '</span>' +
        '<span class="kpi-sub">' + sub + '</span>' +
        '</div>';
    }
  })();
</script>
