name: Deploy ke Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Tulis kredensial clasp
        run: echo "$CLASPRC" > ~/.clasprc.json
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}

      - name: Push ke Apps Script
        run: clasp push -f

      # Versi baru ke deployment live yang SAMA — URL /exec tidak berubah,
      # jadi embed di Google Sites otomatis ikut terbarui tanpa disentuh.
      # Jangan ganti ID ini kecuali sengaja memindah deployment live.
      - name: Deploy versi baru (URL /exec tetap)
        run: clasp deploy -i AKfycby0w9VhrjcB_TnsrMN6N_ozL3QOGFKV5jbICT3MrnrEPmCCCI_g0jn5HWHeqywBS3SUUQ -d "auto ${{ github.sha }}"
