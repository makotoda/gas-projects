name: Deploy Survei Ortala ke Apps Script

# Deploy folder survei-ortala/ ke script-nya sendiri (terpisah dari Kodomo).
# Memakai kredensial clasp yang sama (secret CLASPRC_JSON) — akun tersebut harus
# punya akses edit ke scriptId di survei-ortala/.clasp.json.

on:
  push:
    branches: [claude/survei-ortala-web-app-pz7bto]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: survei-ortala
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Tulis kredensial clasp
        run: echo "$CLASPRC" > ~/.clasprc.json
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}

      - name: Push ke Apps Script (script survei)
        run: clasp push -f

      - name: Deploy/refresh web app (update di tempat, URL stabil)
        run: |
          # Update deployment yang SUDAH ADA di tempat agar URL tetap sama.
          # Kalau deployment itu terhapus, fallback membuat yang baru.
          DEPLOY_ID="AKfycbxcqqNnS54s609QskAV4r6GeSvSg82F22a7TK_Hd_XXVnHwEv1bFQqdCCU-bfS9HoiV"
          clasp deploy -i "$DEPLOY_ID" --description "Survei Ortala (CI)" \
            || clasp deploy --description "Survei Ortala (CI)" \
            || echo "clasp deploy gagal — refresh deployment manual via editor bila perlu."
